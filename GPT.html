<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat</title>
  <style>
    :root {
      --primary-color: #19c37d;
      --primary-dark: #148f5c;
      --bg-color: #ffffff;
      --sidebar-bg: #202123;
      --message-bg-user: #ffffff;
      --message-bg-bot: #f7f7f8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Söhne", ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background-color: var(--bg-color);
    }

    .sidebar {
      width: 260px;
      background-color: var(--sidebar-bg);
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      color: white;
    }

    .new-chat-btn {
      padding: 12px;
      margin: 8px;
      border-radius: 6px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .new-chat-btn:hover {
      background-color: var(--primary-dark);
    }

    .model-selector {
      margin-top: auto;
      padding: 12px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      margin: 8px;
    }

    .model-selector select {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      background: white;
      border: 1px solid #ddd;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      padding-bottom: 120px;
    }

    .message {
      display: flex;
      gap: 1.5rem;
      max-width: 800px;
      margin: 0 auto 2rem;
      padding: 1rem 0;
    }

    .user-message {
      background-color: var(--message-bg-user);
    }

    .bot-message {
      background-color: var(--message-bg-bot);
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .user-avatar {
      background-color: var(--primary-color);
      color: white;
    }

    .bot-avatar {
      background-color: #10a37f;
      color: white;
    }

    .message-content {
      flex: 1;
      padding-top: 4px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .input-container {
      position: fixed;
      bottom: 0;
      left: 260px;
      right: 0;
      padding: 2rem;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 1) 50%);
    }

    .input-wrapper {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
    }

    .message-input {
      width: 100%;
      padding: 1rem 3rem 1rem 1.5rem;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      resize: none;
      min-height: 56px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 1rem;
    }

    .send-button {
      position: absolute;
      right: 1rem;
      bottom: 1rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--primary-color);
      padding: 4px;
    }

    .send-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .send-button svg {
      width: 24px;
      height: 24px;
    }
  </style>
</head>

<body>
  <div class="sidebar">
    <button class="new-chat-btn">+ New Chat</button>
    <div class="model-selector">
      <select id="modelSelector">
        <option value="deepseek">DeepSeek</option>
        <option value="openai">ChatGPT</option>
      </select>
    </div>
  </div>

  <div class="main-content">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="input-container">
      <div class="input-wrapper">
        <textarea class="message-input" id="messageInput" placeholder="Message AI..." rows="1"></textarea>
        <button class="send-button" id="sendButton" onclick="sendMessage()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
  <script>
    const API_KEYS = {
      deepseek: 'sk-9e5f6571012f44319b67c8f6ec49ffca',
      openai: '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'
    };

    const API_ENDPOINTS = {
      deepseek: 'https://api.deepseek.com/v1/chat/completions',
      openai: 'https://api.openai.com/v1/chat/completions'
    };

    const MODEL_NAMES = {
      deepseek: 'deepseek-chat',
      openai: 'gpt-3.5-turbo'
    };

    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const modelSelector = document.getElementById('modelSelector');

    let isGenerating = false;

    async function sendMessage() {
      if (isGenerating) return;

      const message = messageInput.value.trim();
      if (!message) return;

      const selectedModel = modelSelector.value;
      addMessage(message, 'user');
      messageInput.value = '';
      isGenerating = true;
      sendButton.disabled = true;

      try {
        const response = await fetch(API_ENDPOINTS[selectedModel], {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEYS[selectedModel]}`
          },
          body: JSON.stringify({
            model: MODEL_NAMES[selectedModel],
            messages: [{
              role: 'user',
              content: message
            }],
            temperature: 0.7,
            stream: false
          })
        });

        const data = await response.json();
        const botResponse = DOMPurify.sanitize(marked.parse(data.choices[0].message.content));

        addMessage(botResponse, 'bot');
      } catch (error) {
        console.error('Error:', error);
        addMessage('Sorry, there was an error processing your request.', 'bot');
      }

      isGenerating = false;
      sendButton.disabled = false;
    }

    function addMessage(content, role) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}-message`;

      const avatar = document.createElement('div');
      avatar.className = `avatar ${role}-avatar`;
      avatar.textContent = role === 'user' ? 'Y' : 'AI';

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.innerHTML = role === 'user' ? content : content;

      messageDiv.appendChild(avatar);
      messageDiv.appendChild(contentDiv);
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Auto-resize textarea
    messageInput.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    });

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // New chat button
    document.querySelector('.new-chat-btn').addEventListener('click', () => {
      chatMessages.innerHTML = '';
    });
  </script>
</body>

</html>
